<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Movie Poster Wall - By Gemi</title>
    <!-- Tambahan library untuk fitur export gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        #controls {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(20, 20, 20, 0.95);
            padding: 20px;
            border-bottom-right-radius: 12px;
            z-index: 100;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.8);
            max-width: 280px;
            backdrop-filter: blur(5px);
            max-height: 100vh;
            overflow-y: auto;
        }
        /* Styling untuk scrollbar di panel kontrol */
        #controls::-webkit-scrollbar { width: 6px; }
        #controls::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #ccc;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #e50914;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #b20710;
        }
        #scene {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            padding-left: 300px; /* Ruang untuk panel kontrol di desktop */
            padding-top: 50px;
            padding-bottom: 50px;
            box-sizing: border-box;
        }
        #wall {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            max-width: 1300px;
        }
        .poster {
            background-color: #111;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            object-fit: cover;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .poster:hover {
            transform: scale(1.08) translateZ(30px) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 15px rgba(229, 9, 20, 0.3);
            z-index: 10;
            cursor: pointer;
        }
        .message {
            color: #888;
            font-size: 1.2rem;
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
        }
        .loading {
            animation: pulse 1.5s infinite;
        }
        .error {
            color: #e50914;
        }
        .ai-badge {
            display: inline-block;
            background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
            vertical-align: middle;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* Notifikasi kustom pengganti alert */
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #e50914;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            font-weight: bold;
        }
        #notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 768px) {
            #controls {
                position: relative;
                max-width: 100%;
                border-radius: 0;
            }
            #scene {
                padding-left: 0;
            }
        }
    </style>
</head>
<body>

<div id="notification">Pesan Notifikasi</div>

<div id="controls">
    <div class="control-group">
        <label>TMDB API Key</label>
        <input type="password" id="apiKey" placeholder="Masukkan API Key TMDB v3">
    </div>
    <div class="control-group">
        <label>Gemini API Key <span class="ai-badge">AI</span></label>
        <input type="password" id="geminiKey" placeholder="Kosongkan jika di dalam Canvas">
    </div>
    <div class="control-group">
        <label>Pencarian Pintar AI (Prompt)</label>
        <input type="text" id="keyword" placeholder="Contoh: Film plot twist tahun 2000an">
    </div>
    <div class="control-group">
        <label>Jumlah Poster: <span id="countVal">14</span></label>
        <input type="range" id="posterCount" min="4" max="40" value="14">
    </div>
    <div class="control-group">
        <label>Lebar Poster (px): <span id="widthVal">180</span></label>
        <input type="range" id="posterWidth" min="100" max="350" value="180">
    </div>
    <div class="control-group">
        <label>Rasio (Tinggi/Lebar): <span id="ratioVal">1.5</span></label>
        <input type="range" id="posterRatio" min="1.0" max="2.0" step="0.05" value="1.5">
    </div>
    <div class="control-group">
        <label>Tilt Vertikal (Rotasi X): <span id="rotXVal">10</span>°</label>
        <input type="range" id="rotX" min="-45" max="45" value="10">
    </div>
    <div class="control-group">
        <label>Tilt Horizontal (Rotasi Y): <span id="rotYVal">-15</span>°</label>
        <input type="range" id="rotY" min="-60" max="60" value="-15">
    </div>
    <div class="control-group">
        <label>Kedalaman 3D (Perspektif): <span id="perspVal">1200</span></label>
        <input type="range" id="perspective" min="500" max="3000" value="1200">
    </div>
    <button id="generateBtn" style="margin-bottom: 10px;">Buat Dinding Poster</button>
    <button id="exportBtn" style="background: #0056b3;">Export Gambar (1920x1080)</button>
</div>

<div id="scene">
    <div id="wall">
        <div class="message">Masukkan API Key TMDB, lalu ketik ide film apa saja yang ingin kamu lihat!</div>
    </div>
</div>

<script>
    const apiKey = ""; // Akan terisi otomatis oleh environment Canvas

    const DOM = {
        apiKey: document.getElementById('apiKey'),
        geminiKey: document.getElementById('geminiKey'),
        keyword: document.getElementById('keyword'),
        posterCount: document.getElementById('posterCount'),
        posterWidth: document.getElementById('posterWidth'),
        posterRatio: document.getElementById('posterRatio'),
        rotX: document.getElementById('rotX'),
        rotY: document.getElementById('rotY'),
        perspective: document.getElementById('perspective'),
        generateBtn: document.getElementById('generateBtn'),
        exportBtn: document.getElementById('exportBtn'),
        wall: document.getElementById('wall'),
        scene: document.getElementById('scene'),
        notification: document.getElementById('notification')
    };

    let notifTimeout;

    // Fungsi notifikasi kustom pengganti alert()
    const showNotification = (msg) => {
        DOM.notification.innerText = msg;
        DOM.notification.classList.add('show');
        clearTimeout(notifTimeout);
        notifTimeout = setTimeout(() => {
            DOM.notification.classList.remove('show');
        }, 3000);
    };

    // Fungsi untuk memperbarui angka di label slider
    const updateLabels = () => {
        document.getElementById('countVal').innerText = DOM.posterCount.value;
        document.getElementById('widthVal').innerText = DOM.posterWidth.value;
        document.getElementById('ratioVal').innerText = DOM.posterRatio.value;
        document.getElementById('rotXVal').innerText = DOM.rotX.value;
        document.getElementById('rotYVal').innerText = DOM.rotY.value;
        document.getElementById('perspVal').innerText = DOM.perspective.value;
    };

    // Fungsi untuk mengaplikasikan efek dinding 3D
    const applyTransform = () => {
        DOM.scene.style.perspective = `${DOM.perspective.value}px`;
        DOM.wall.style.transform = `rotateX(${DOM.rotX.value}deg) rotateY(${DOM.rotY.value}deg)`;
    };

    // Menambahkan Event Listener ke semua slider
    ['posterCount', 'posterWidth', 'posterRatio', 'rotX', 'rotY', 'perspective'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            updateLabels();
            applyTransform();
            updatePosterSizes();
        });
    });

    // Fungsi *real-time* mengubah ukuran poster tanpa harus fetch ulang
    const updatePosterSizes = () => {
        const width = DOM.posterWidth.value;
        const height = width * DOM.posterRatio.value;
        document.querySelectorAll('.poster').forEach(img => {
            img.style.width = `${width}px`;
            img.style.height = `${height}px`;
        });
    };

    // Fungsi Exponential Backoff untuk menangani limit API
    async function fetchWithBackoff(url, options = {}) {
        const delays = [1000, 2000, 4000, 8000, 16000];
        let lastError;
        for (let i = 0; i <= delays.length; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                return response;
            } catch (error) {
                lastError = error;
                // Jangan lakukan retry jika errornya adalah Client Error yang fatal (400, 403, 404)
                if (error.message.includes('400') || error.message.includes('403') || error.message.includes('404')) {
                    throw error;
                }
                if (i < delays.length) {
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }
        throw lastError;
    }

    // Fallback lama (Jika Gemini gagal/tidak ada API)
    const getSmartUrl = async (key, keyword) => {
        if (!keyword) return `https://api.themoviedb.org/3/movie/popular?api_key=${key}&language=en-US&page=1`;
        const lowKey = keyword.toLowerCase();
        if (lowKey.includes('netflix')) return `https://api.themoviedb.org/3/discover/movie?api_key=${key}&language=en-US&sort_by=popularity.desc&with_watch_providers=8&watch_region=US`;
        if (lowKey.includes('marvel')) return `https://api.themoviedb.org/3/discover/movie?api_key=${key}&language=en-US&sort_by=popularity.desc&with_companies=420`;
        return `https://api.themoviedb.org/3/search/multi?api_key=${key}&query=${encodeURIComponent(keyword)}&language=en-US&page=1`;
    };

    // Logika utama untuk menarik data 
    DOM.generateBtn.addEventListener('click', async () => {
        const tmdbKey = DOM.apiKey.value.trim();
        const searchKeyword = DOM.keyword.value.trim();
        const finalGeminiKey = DOM.geminiKey.value.trim() || apiKey;

        if (!tmdbKey) {
            showNotification('Tolong masukkan API Key TMDB terlebih dahulu ya!');
            return;
        }

        const count = parseInt(DOM.posterCount.value);
        let finalMovies = [];

        DOM.wall.innerHTML = '<div class="message loading">Memproses permintaanmu...</div>';

        try {
            // JIKA ada keyword dan API Key Gemini, gunakan AI!
            if (searchKeyword && finalGeminiKey) {
                DOM.wall.innerHTML = `<div class="message loading">Gemini AI sedang mencari rekomendasi untuk:<br>"${searchKeyword}"...</div>`;
                
                try {
                    const prompt = `Kamu adalah sistem rekomendasi film. Berikan daftar judul film atau TV series yang cocok dengan deskripsi berikut: "${searchKeyword}". Berikan setidaknya ${count + 5} judul paling relevan.`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    titles: { type: "ARRAY", items: { type: "STRING" } }
                                }
                            }
                        }
                    };

                    let geminiRes;
                    let aiSuccess = false;
                    let lastAiErr;

                    // Fallback berantai jika model utama mengembalikan 404
                    const geminiModels = [
                        "gemini-2.5-flash-preview-09-2025",
                        "gemini-2.5-flash",
                        "gemini-1.5-flash"
                    ];

                    for (const model of geminiModels) {
                        try {
                            const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${finalGeminiKey}`;
                            geminiRes = await fetchWithBackoff(geminiUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            aiSuccess = true;
                            break; // Berhasil, keluar dari loop
                        } catch (err) {
                            lastAiErr = err;
                            console.warn(`Model ${model} failed: ${err.message}`);
                        }
                    }

                    if (!aiSuccess) throw lastAiErr;

                    const geminiData = await geminiRes.json();
                    
                    // Ekstrak hasil JSON dari Gemini
                    const jsonText = geminiData.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (jsonText) {
                        const parsedData = JSON.parse(jsonText);
                        const titles = parsedData.titles || [];

                        DOM.wall.innerHTML = '<div class="message loading">Menarik poster film dari TMDB...</div>';

                        // Melakukan pencarian TMDB satu-satu berdasarkan judul rekomendasi AI
                        for (const title of titles) {
                            try {
                                const tmdbRes = await fetchWithBackoff(`https://api.themoviedb.org/3/search/multi?api_key=${tmdbKey}&query=${encodeURIComponent(title)}&language=en-US&page=1`);
                                const tmdbData = await tmdbRes.json();
                                
                                // Ambil hasil pertama yang punya gambar poster
                                const validMovie = tmdbData.results?.find(item => item.poster_path);
                                
                                if (validMovie && !finalMovies.find(m => m.id === validMovie.id)) {
                                    finalMovies.push(validMovie);
                                }
                                if (finalMovies.length >= count) break; // Berhenti jika poster sudah mencukupi
                            } catch (tmdbErr) {
                                // Abaikan error individual TMDB dan lanjut ke judul berikutnya
                            }
                        }
                    }
                } catch (aiError) {
                    console.error("Gemini Error:", aiError);
                    showNotification('Gagal menggunakan AI (server penuh/gangguan). Menggunakan pencarian standar...');
                }
            }

            // Fallback: Jika AI gagal, tidak ada API Gemini, atau tidak ada keyword
            if (finalMovies.length === 0) {
                const url = await getSmartUrl(tmdbKey, searchKeyword);
                const res = await fetchWithBackoff(url);
                const data = await res.json();

                if (data.status_code === 7 || data.success === false) {
                    showNotification('API Key TMDB tidak valid atau kadaluarsa.');
                    DOM.wall.innerHTML = '<div class="message error">Gagal memuat. Periksa API Key TMDB Anda.</div>';
                    return;
                }
                finalMovies = data.results.filter(item => item.poster_path);
            }

            if (finalMovies.length === 0) {
                DOM.wall.innerHTML = `<div class="message error">Tidak ada poster ditemukan untuk "${searchKeyword}".</div>`;
                return;
            }

            DOM.wall.innerHTML = ''; // Bersihkan dinding
            
            const width = DOM.posterWidth.value;
            const height = width * DOM.posterRatio.value;

            // Jika jumlah yang diminta lebih banyak dari hasil, kita loop datanya
            const displayMovies = [];
            for(let i=0; i < count; i++) {
                displayMovies.push(finalMovies[i % finalMovies.length]);
            }

            // Membuat elemen gambar untuk setiap film
            displayMovies.forEach((movie) => {
                if (movie.poster_path) {
                    const img = document.createElement('img');
                    img.crossOrigin = 'anonymous'; 
                    img.src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                    img.className = 'poster';
                    img.style.width = `${width}px`;
                    img.style.height = `${height}px`;
                    img.alt = movie.title || movie.name; 
                    img.title = movie.title || movie.name;
                    DOM.wall.appendChild(img);
                }
            });

        } catch (err) {
            console.error(err);
            showNotification('Gagal memproses data. Terjadi gangguan koneksi atau server.');
            DOM.wall.innerHTML = '<div class="message error">Terjadi kesalahan saat memuat data. Silakan coba lagi nanti.</div>';
        }
    });

    // Fitur Export Gambar ke Resolusi HD (1920x1080)
    DOM.exportBtn.addEventListener('click', async () => {
        showNotification('Memproses gambar HD (1920x1080), mohon tunggu...');
        
        const originalWidth = DOM.scene.style.width;
        const originalHeight = DOM.scene.style.height;
        const originalPadding = DOM.scene.style.paddingLeft;
        
        DOM.scene.style.width = '1920px';
        DOM.scene.style.height = '1080px';
        DOM.scene.style.paddingLeft = '0'; 
        DOM.scene.style.minHeight = 'unset';

        try {
            const dataUrl = await htmlToImage.toJpeg(DOM.scene, { 
                quality: 0.95,
                width: 1920,
                height: 1080,
                backgroundColor: '#050505',
                style: { transform: 'scale(1)' },
                pixelRatio: 1 
            });

            DOM.scene.style.width = originalWidth;
            DOM.scene.style.height = originalHeight;
            DOM.scene.style.paddingLeft = originalPadding;
            DOM.scene.style.minHeight = '100vh';

            const link = document.createElement('a');
            link.download = `CineWall-${DOM.keyword.value || 'AI-Generated'}.jpg`;
            link.href = dataUrl;
            link.click();
            
            showNotification('Gambar berhasil diexport!');
        } catch (error) {
            console.error('Error saat export:', error);
            showNotification('Gagal mengexport gambar. Pastikan gambar sudah dimuat sepenuhnya.');
            
            DOM.scene.style.width = originalWidth;
            DOM.scene.style.height = originalHeight;
            DOM.scene.style.paddingLeft = originalPadding;
            DOM.scene.style.minHeight = '100vh';
        }
    });

    // Inisialisasi awal saat pertama dibuka
    updateLabels();
    applyTransform();
</script>
</body>
</html>
